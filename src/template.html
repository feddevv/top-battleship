<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Battleship</h1>
        <p>Deploy your fleet and fire with precision.</p>
      </header>

      <div class="boards">
        <section class="board-wrap">
          <h2>Player Waters</h2>
          <div class="player-board grid"></div>
        </section>

        <section class="board-wrap">
          <h2>Enemy Waters</h2>
          <div class="enemy-board grid"></div>
        </section>
      </div>

      <div class="buttons">
        <button class="btn random">Random</button>
      </div>

      <dialog id="my-popup" class="result-dialog" data-result="win">
        <div class="result-modal-card">
          <p class="result-kicker"></p>
          <h2 class="result-title"></h2>
          <p class="result-message"></p>

          <div class="result-actions">
            <button
              commandfor="my-popup"
              command="close"
              class="btn result-primary"
              type="button"
            >
              Close
            </button>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
