<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Battleship</h1>
        <p>Deploy your fleet and fire with precision.</p>
      </header>

      <div class="boards">
        <section class="board-wrap">
          <h2>Player Waters</h2>
          <div class="player-board grid"></div>
        </section>

        <section class="board-wrap">
          <h2>Enemy Waters</h2>
          <div class="enemy-board grid"></div>
        </section>
      </div>

      <section class="fleet-dock" aria-label="Fleet staging area">
        <div class="fleet-dock-head">
          <h2>Fleet Dock</h2>
          <p>Arrange ships here before placing them on the board.</p>
        </div>

        <div class="fleet-list">
          <button
            data-length="4"
            class="dock-ship length-4"
            type="button"
            draggable="true"
          >
            <span></span><span></span><span></span><span></span>
          </button>

          <button
            data-length="3"
            class="dock-ship length-3"
            type="button"
            draggable="true"
          >
            <span></span><span></span><span></span>
          </button>

          <button
            data-length="3"
            class="dock-ship length-3"
            type="button"
            draggable="true"
          >
            <span></span><span></span><span></span>
          </button>

          <button
            data-length="2"
            class="dock-ship length-2"
            type="button"
            draggable="true"
          >
            <span></span><span></span>
          </button>

          <button
            data-length="2"
            class="dock-ship length-2"
            type="button"
            draggable="true"
          >
            <span></span><span></span>
          </button>

          <button
            data-length="2"
            class="dock-ship length-2"
            type="button"
            draggable="true"
          >
            <span></span><span></span>
          </button>

          <button
            data-length="1"
            class="dock-ship length-1"
            type="button"
            draggable="true"
          >
            <span></span>
          </button>

          <button
            data-length="1"
            class="dock-ship length-1"
            type="button"
            draggable="true"
          >
            <span></span>
          </button>

          <button
            data-length="1"
            class="dock-ship length-1"
            type="button"
            draggable="true"
          >
            <span></span>
          </button>

          <button
            data-length="1"
            class="dock-ship length-1"
            type="button"
            draggable="true"
          >
            <span></span>
          </button>
        </div>
      </section>

      <div class="buttons">
        <button class="btn random">Random</button>
        <button class="btn reset">Reset</button>
      </div>
      <dialog id="my-popup" class="result-dialog" data-result="win">
        <div class="result-modal-card">
          <p class="result-kicker"></p>
          <h2 class="result-title"></h2>
          <p class="result-message"></p>

          <div class="result-actions">
            <button
              commandfor="my-popup"
              command="close"
              class="btn result-primary"
              type="button"
            >
              Close
            </button>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
